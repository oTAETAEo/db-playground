version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: playground-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: playground
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - playground-network

volumes:
  mysql_data:
  mongo_data:

networks:
  playground-network:
    driver: bridge